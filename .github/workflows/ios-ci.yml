name: iOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  simulator:
    name: Unsigned iOS simulator build
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build PhoneDex for the generic simulator
        run: >-
          xcodebuild
          -project ios/PhoneDex.xcodeproj
          -scheme PhoneDex
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath "$RUNNER_TEMP/PhoneDexDerivedData"
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          build

      - name: Run PhoneDex unit and UI tests
        run: >-
          xcodebuild
          -project ios/PhoneDex.xcodeproj
          -scheme PhoneDex
          -destination 'platform=iOS Simulator,name=iPhone 17'
          -derivedDataPath "$RUNNER_TEMP/PhoneDexTestDerivedData"
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO
          test
