name: Node CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bridge:
    name: Node ${{ matrix.node-version }} bridge checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 22.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check bridge
        run: npm run check

      - name: Verify release identity and provenance inputs
        run: npm run release:verify

      - name: Run bridge fixture tests
        run: npm test

  windows-adapter:
    name: Windows adapter matrix
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 22.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Syntax check bridge
        run: npm run check

      - name: Validate Windows adapter and Scheduled Tasks contract
        run: npm run test:windows-adapter

      - name: Validate Windows service lifecycle
        run: npm run test:windows-service-lifecycle

  macos-service:
    name: macOS LaunchAgent lifecycle
    runs-on: macos-15
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 22.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Validate macOS LaunchAgent lifecycle
        run: npm run test:macos-service-lifecycle
