name: PhoneDex
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.9
targets:
  PhoneDex:
    type: application
    platform: iOS
    sources:
      - PhoneDexApp
    resources:
      - PhoneDexApp/PrivacyInfo.xcprivacy
    settings:
      base:
        DEVELOPMENT_TEAM: RQRRLJ37K2
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_BUNDLE_IDENTIFIER: com.nash226.PhoneDex
        INFOPLIST_FILE: PhoneDexApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: PhoneDexApp/PhoneDex.entitlements
    dependencies:
      - target: PhoneDexNotificationExtension
  PhoneDexNotificationExtension:
    type: app-extension
    platform: iOS
    sources:
      - PhoneDexNotificationExtension
    settings:
      base:
        DEVELOPMENT_TEAM: RQRRLJ37K2
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_BUNDLE_IDENTIFIER: com.nash226.PhoneDex.NotificationExtension
        INFOPLIST_FILE: PhoneDexNotificationExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: PhoneDexNotificationExtension/PhoneDexNotificationExtension.entitlements
        APPLICATION_EXTENSION_API_ONLY: YES
  PhoneDexTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PhoneDexTests
    dependencies:
      - target: PhoneDex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nash226.PhoneDexTests
        GENERATE_INFOPLIST_FILE: YES
  PhoneDexUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - PhoneDexUITests
    dependencies:
      - target: PhoneDex
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nash226.PhoneDexUITests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  PhoneDex:
    build:
      targets:
        PhoneDex: all
        PhoneDexNotificationExtension: all
        PhoneDexTests: [test]
    test:
      targets:
        - PhoneDexTests
        - PhoneDexUITests
